apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-deployment
  namespace: wanderlust
  labels:
    app: frontend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend

          image: nadeem90/wanderlust-frontend:v2

          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service

metadata:
  name: frontend-service
  namespace: wanderlust

spec:
  type: NodePort

  selector:
    app: frontend

  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      nodePort: 31000
